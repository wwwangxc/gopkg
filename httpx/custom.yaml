client:
  http: 
    header:
      User-Agent: agent_global
      Content-Type: content_type_global
    transport:
      max_idle_conns: 100
      max_idle_conns_per_host: 200
      max_conns_per_host: 300
      idle_conn_timeout: 1s
      tls_handshake_timeout: 2s
      expect_continue_timeout: 3s
      response_header_timeout: 4s
      dial:
        timeout: 5s
        keep_alive: 6s
  service:
    - name: httpA
      dsn: https://httpbin.org
      timeout: 3000
    - name: httpB
      dsn: https://httpbin1.org,https://httpbin2.org
      timeout: 1000
      header:
        User-Agent: agent_custom
        Content-Type: content_type_custom
      transport:
        max_idle_conns: 300
        max_idle_conns_per_host: 200
        max_conns_per_host: 100
        idle_conn_timeout: 6s
        tls_handshake_timeout: 5s
        expect_continue_timeout: 4s
        response_header_timeout: 3s
        dial:
          timeout: 2s
          keep_alive: 1s
